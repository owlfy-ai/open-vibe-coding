    <!-- Theme -->
    <meta name="theme-color" content="#f5f5f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c0c0e" media="(prefers-color-scheme: dark)" />
    <script>
      // Apply the system theme before first paint to avoid a flash while the
      // persisted preference loads. The app refines this once settings hydrate.
      (function () {
        try {
          var dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
